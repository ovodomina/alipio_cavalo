name: Build Flask IMC (Windows)

on: [push]

jobs:
  build:
    runs-on: windows-latest  # Agora gera um .exe real
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar Testes
        run: |
          pytest tests/

      - name: Gerar Executável
        run: pyinstaller --onefile --noconsole src/app.py
        # --noconsole impede que abra aquela janelinha preta de terminal atrás da web

      - name: Disponibilizar Executável
        uses: actions/upload-artifact@v4
        with:
          name: IMC-Flask-Windows
          path: dist/app.exe